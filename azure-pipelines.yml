trigger:
  branches:
    include:
    - main

variables:
  - group: ServiceNow

stages:

  - stage: Build
    displayName: 'Build da Aplicação'
    jobs:
      - job: Job
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'

          - task: CmdLine@2
            displayName: 'npm install and build'
            inputs:
              script: |
                npm install
                npm run build

  - stage: CreateChange
    displayName: 'Criar Change no ServiceNow'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: OpenChange
        displayName: 'Abrir Change Request'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: PowerShell@2
            displayName: 'POST para ServiceNow'
            inputs:
              targetType: inline
              script: |
                $headers = @{
                  "Content-Type"  = "application/json"
                  "Authorization" = "Basic $(SN_CREDENTIALS)"
                }

                $body = @{
                  short_description = "Deploy $(Build.DefinitionName) - Build $(Build.BuildNumber)"
                  description       = "Pipeline: $(Build.DefinitionName) | Branch: $(Build.SourceBranchName) | Solicitado por: $(Build.RequestedFor)"
                  type              = "normal"
                  category          = "Software"
                  state             = "1"
                } | ConvertTo-Json

                try {
                  $response = Invoke-RestMethod `
                    -Uri "https://suzanodev.service-now.com/api/now/table/change_request" `
                    -Method POST `
                    -Headers $headers `
                    -Body $body

                  Write-Host "Change criado com sucesso: $($response.result.number)"
                  Write-Host "sys_id: $($response.result.sys_id)"
                  echo "##vso[task.setvariable variable=changeNumber;isOutput=true]$($response.result.number)"
                  echo "##vso[task.setvariable variable=changeSysId;isOutput=true]$($response.result.sys_id)"
                } catch {
                  Write-Error "Erro ao criar Change: $_"
                  exit 1
                }
            name: CreateChangeStep

  - stage: WaitApproval
    displayName: 'Aguardar Aprovacao do Change'
    dependsOn: CreateChange
    condition: succeeded()
    jobs:
      - job: CheckApproval
        displayName: 'Verificar Aprovacao'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: PowerShell@2
            displayName: 'Polling status do Change'
            inputs:
              targetType: inline
              script: |
                $maxAttempts = 20
                $attempt = 0
                $approved = $false

                Write-Host "Aguardando aprovacao do Change no ServiceNow..."

                do {
                  Start-Sleep -Seconds 30
                  $attempt++

                  try {
                    $response = Invoke-RestMethod `
                      -Uri "https://suzanodev.service-now.com/api/now/table/change_request?sysparm_query=stateIN-1^ORstate=0&sysparm_fields=number,state&sysparm_limit=1" `
                      -Method GET `
                      -Headers @{
                        "Authorization" = "Basic $(SN_CREDENTIALS)"
                        "Content-Type"  = "application/json"
                      }

                    $state = $response.result[0].state
                    Write-Host "Tentativa $attempt/$maxAttempts - Status atual: $state"

                    if ($state -eq "-1" -or $state -eq "0") {
                      $approved = $true
                    }
                  } catch {
                    Write-Warning "Erro ao consultar status (tentativa $attempt): $_"
                  }

                } while (-not $approved -and $attempt -lt $maxAttempts)

                if (-not $approved) {
                  Write-Error "Change nao aprovado apos $($maxAttempts * 30 / 60) minutos. Pipeline cancelado."
                  exit 1
                }

                Write-Host "Change aprovado. Pipeline finalizado."