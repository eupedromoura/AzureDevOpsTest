trigger:
  branches:
    include:
    - main

variables:
  - group: ServiceNow

stages:

  - stage: Build
    displayName: 'Build da Aplicação'
    jobs:
      - job: Job
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
            displayName: 'Install Node.js'

          - task: CmdLine@2
            displayName: 'npm install and build'
            inputs:
              script: |
                npm install
                npm run build

  - stage: CreateChange
    displayName: 'Criar Change no ServiceNow'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: OpenChange
        displayName: 'Abrir Change Request'
        pool:
          vmImage: windows-latest  # ← Alterado para Windows
        steps:
          - task: ServiceNow-DevOps-Server-Change-Acceleration@1
            displayName: 'Criar e Aguardar Aprovação do Change'
            inputs:
              connectedServiceName: "SN-ChangeVelocity-Suzano"
              changeRequestDetails: |
                {
                  "attributes": {
                    "requested_by": {
                      "name": "eupedromoura"
                    },
                    "assignment_group": {
                      "name": "Change Approval Team"
                    },
                    "short_description": "Deploy pipeline: $(Build.DefinitionName) - Branch: $(Build.SourceBranchName)",
                    "priority": "2",
                    "comments": "Build ID: $(Build.BuildId) | Solicitado por: $(Build.RequestedFor)",
                    "start_date": "2025-03-27 08:00:00",
                    "end_date": "2025-03-27 18:00:00"
                  }
                }

  - stage: Deploy
    displayName: 'Deploy da Aplicação'
    dependsOn: CreateChange
    condition: succeeded()
    jobs:
      - job: DeployJob
        displayName: 'Executar Deploy'
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: CmdLine@2
            displayName: 'Executar Deploy'
            inputs:
              script: |
                echo "Iniciando deploy da branch $(Build.SourceBranchName)"
                echo "Build ID: $(Build.BuildId)"